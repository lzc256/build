name: Zeroclaw - Build Debian Docker Image

on:
  workflow_dispatch:
    inputs:
      patch_name:
        description: 'Patch name (without .sh)'
        required: true
        default: 'finalize_draft'
      zeroclaw_ref:
        description: 'Zeroclaw branch/tag/commit'
        required: false
        default: 'main'
      image_tag:
        description: 'Docker image tag suffix'
        required: false
        default: 'patched'

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  CARGO_FEATURES: channel-matrix,channel-lark,whatsapp-web
  RUST_TOOLCHAIN: "1.93.0"

jobs:
  build:
    name: Build (amd64)
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone zeroclaw
        uses: actions/checkout@v4
        with:
          repository: zeroclaw-labs/zeroclaw
          path: zeroclaw
          ref: ${{ github.event.inputs.zeroclaw_ref }}

      - name: Apply patch
        run: |
          set -e
          source scripts/common.sh
          apply_patch "${{ github.event.inputs.patch_name }}" zeroclaw

      - name: Show patched files
        run: git -C zeroclaw diff --stat

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          prefix-key: ubuntu-22.04

      - name: Build release binary
        run: |
          cd zeroclaw
          cargo build --release --locked --features "${{ env.CARGO_FEATURES }}" --target x86_64-unknown-linux-gnu

      - name: Check binary size
        run: |
          SIZE=$(stat -c%s zeroclaw/target/x86_64-unknown-linux-gnu/release/zeroclaw)
          echo "Binary size: $SIZE bytes"
          if [ "$SIZE" -lt 10000000 ]; then
            echo "::error::Binary suspiciously small, build may have failed"
            exit 1
          fi

      - name: Prepare Docker context
        run: |
          set -e
          mkdir -p docker-ctx/bin/amd64
          mkdir -p docker-ctx/zeroclaw-data/.zeroclaw docker-ctx/zeroclaw-data/workspace
          mkdir -p docker-ctx/bin/amd64/web/dist
          cp zeroclaw/target/x86_64-unknown-linux-gnu/release/zeroclaw docker-ctx/bin/amd64/
          touch docker-ctx/bin/amd64/web/dist/.gitkeep

      - name: Generate config.toml
        env:
          CONFIG_CONTENT: |
            workspace_dir = "/zeroclaw-data/workspace"
            config_path = "/zeroclaw-data/.zeroclaw/config.toml"
            api_key = ""
            default_provider = "openrouter"
            default_model = "anthropic/claude-sonnet-4-20250514"
            default_temperature = 0.7

            [gateway]
            port = 42617
            host = "[::]"
            allow_public_bind = true
            web_dist_dir = "/zeroclaw-data/web/dist"

            [autonomy]
            level = "supervised"
            auto_approve = ["file_read", "file_write", "file_edit", "memory_recall", "memory_store", "web_search_tool", "web_fetch", "calculator", "glob_search", "content_search", "image_info", "weather", "git_operations"]
        run: |
          echo "$CONFIG_CONTENT" > docker-ctx/zeroclaw-data/.zeroclaw/config.toml
          mkdir -p docker-ctx/zeroclaw-data/workspace
          chown -R 65534:65534 docker-ctx/zeroclaw-data/

      - name: Copy Dockerfile
        run: cp zeroclaw/Dockerfile.debian.ci docker-ctx/Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(cd zeroclaw && sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          echo "image_tag=${{ github.event.inputs.image_tag }}-${TIMESTAMP}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker-ctx
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:zeroclaw-${{ steps.version.outputs.image_tag }}-debian
            ${{ env.REGISTRY }}/${{ github.repository }}:zeroclaw-${{ steps.version.outputs.version }}-${{ steps.version.outputs.image_tag }}-debian
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Zeroclaw Build Summary"
          echo "| Item | Value |"
          echo "|------|-------|"
          echo "| Patch | \`${{ github.event.inputs.patch_name }}\` |"
          echo "| Ref | \`${{ github.event.inputs.zeroclaw_ref }}\` |"
          echo "| Version | \`${{ steps.version.outputs.version }}\` |"
          echo "| Image | \`${{ env.REGISTRY }}/${{ github.repository }}:zeroclaw-${{ steps.version.outputs.image_tag }}-debian\` |"
