name: Zeroclaw - Build & Package

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      zeroclaw_ref:
        description: 'Zeroclaw branch/tag/commit'
        required: false
        default: 'master'
      image_tag:
        description: 'Docker image tag suffix'
        required: false
        default: 'debian'

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  CARGO_FEATURES: channel-matrix,channel-lark,whatsapp-web
  RUST_TOOLCHAIN: "1.93.0"

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - name: Checkout patch framework
        uses: actions/checkout@v4

      - name: Clone zeroclaw
        uses: actions/checkout@v4
        with:
          repository: zeroclaw-labs/zeroclaw
          path: zeroclaw-src
          ref: ${{ github.event.inputs.zeroclaw_ref }}

      - name: Apply all patches
        run: |
          set -e
          source scripts/common.sh
          for patch in zeroclaw/patches/*.sh; do
            [ -f "$patch" ] || continue
            patch_name=$(basename "$patch" .sh)
            apply_patch "$patch_name" zeroclaw-src
          done

      - name: Show patched files
        run: git -C zeroclaw-src diff --stat

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          prefix-key: ubuntu-22.04

      - name: Build release binary
        run: |
          cd zeroclaw-src
          cargo build --release --locked --features "${{ env.CARGO_FEATURES }}" --target x86_64-unknown-linux-gnu

      - name: Check binary size
        run: |
          SIZE=$(stat -c%s zeroclaw-src/target/x86_64-unknown-linux-gnu/release/zeroclaw)
          echo "Binary size: $SIZE bytes"
          if [ "$SIZE" -lt 10000000 ]; then
            echo "::error::Binary suspiciously small, build may have failed"
            exit 1
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-binary-${{ github.run_number }}
          path: zeroclaw-src/target/x86_64-unknown-linux-gnu/release/zeroclaw
          retention-days: 7

      - name: Prepare Docker context
        run: |
          set -e
          mkdir -p docker-ctx/bin/amd64/web/dist
          mkdir -p docker-ctx/zeroclaw-data/.zeroclaw docker-ctx/zeroclaw-data/workspace
          cp zeroclaw-src/target/x86_64-unknown-linux-gnu/release/zeroclaw docker-ctx/bin/amd64/
          touch docker-ctx/bin/amd64/web/dist/.gitkeep
          cp zeroclaw-src/Dockerfile.debian.ci docker-ctx/Dockerfile

      - name: Generate config.toml
        env:
          CONFIG_CONTENT: |
            workspace_dir = "/zeroclaw-data/workspace"
            config_path = "/zeroclaw-data/.zeroclaw/config.toml"
            api_key = ""
            default_provider = "openrouter"
            default_model = "anthropic/claude-sonnet-4-20250514"
            default_temperature = 0.7

            [gateway]
            port = 42617
            host = "[::]"
            allow_public_bind = true
            web_dist_dir = "/zeroclaw-data/web/dist"

            [autonomy]
            level = "supervised"
            auto_approve = ["file_read", "file_write", "file_edit", "memory_recall", "memory_store", "web_search_tool", "web_fetch", "calculator", "glob_search", "content_search", "image_info", "weather", "git_operations"]
        run: |
          echo "$CONFIG_CONTENT" > docker-ctx/zeroclaw-data/.zeroclaw/config.toml
          mkdir -p docker-ctx/zeroclaw-data/workspace

      - name: Extract version
        id: version
        run: |
          VERSION=$(cd zeroclaw-src && sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # Use commit hash for push trigger, inputs.image_tag for manual trigger
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "image_tag=${GITHUB_SHA:0:8}" >> "$GITHUB_OUTPUT"
            echo "should_push=true" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
            echo "should_push=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: docker-ctx
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:zeroclaw-${{ steps.version.outputs.image_tag }}-debian
            ${{ env.REGISTRY }}/${{ github.repository }}:zeroclaw-${{ steps.version.outputs.version }}-${{ steps.version.outputs.image_tag }}-debian
          platforms: linux/amd64

      - name: Summary
        run: |
          echo "## Zeroclaw Build Summary"
          echo "| Item | Value |"
          echo "|------|-------|"
          echo "| Ref | \`${{ github.event.inputs.zeroclaw_ref || github.sha }}\` |"
          echo "| Version | \`${{ steps.version.outputs.version }}\` |"
          echo "| Image Tag | \`${{ steps.version.outputs.image_tag }}\` |"
          echo "| Docker | \`${{ env.REGISTRY }}/${{ github.repository }}:zeroclaw-${{ steps.version.outputs.image_tag }}-debian\` |"
