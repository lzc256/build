name: Zeroclaw - Build & Package

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'zeroclaw/**'
      - 'scripts/**'
      - 'patches/**'
      - '.github/workflows/zeroclaw-docker.yml'

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  CARGO_FEATURES: channel-matrix,channel-lark,whatsapp-web
  RUST_TOOLCHAIN: "1.93.0"

permissions:
  contents: read
  packages: write

jobs:
  check-update:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.compare.outputs.should_build }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Get latest version
        id: version
        run: |
          TAG=$(curl -s https://api.github.com/repos/zeroclaw-labs/zeroclaw/releases/latest | jq -r '.tag_name')
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          echo "tag_name=${TAG}" >> $GITHUB_OUTPUT

      - name: Cache check
        id: cache
        uses: actions/cache@v4
        with:
          path: version.txt
          key: zeroclaw-version-${{ steps.version.outputs.tag_name }}

      - name: Compare versions
        id: compare
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "Push triggered. Building."
            echo "should_build=true" >> $GITHUB_OUTPUT
          elif [ -f version.txt ]; then
            LAST_VERSION=$(cat version.txt)
            if [ "$LAST_VERSION" != "${{ steps.version.outputs.version }}" ]; then
              echo "Version updated: ${LAST_VERSION} -> ${{ steps.version.outputs.version }}. Building."
              echo "should_build=true" >> $GITHUB_OUTPUT
            else
              echo "No update: ${{ steps.version.outputs.version }} == ${LAST_VERSION}. Skipping."
              echo "should_build=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "First build: ${{ steps.version.outputs.version }}. Building."
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-update
    if: needs.check-update.outputs.should_build == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - name: Checkout patch framework
        uses: actions/checkout@v4

      - name: Clone zeroclaw
        uses: actions/checkout@v4
        with:
          repository: zeroclaw-labs/zeroclaw
          path: zeroclaw-src
          ref: ${{ needs.check-update.outputs.version }}

      - name: Apply all patches
        run: |
          set -e
          source scripts/common.sh
          for patch in zeroclaw/patches/*.sh; do
            [ -f "$patch" ] || continue
            patch_name=$(basename "$patch" .sh)
            apply_patch "$patch_name" zeroclaw-src
          done

      - name: Show patched files
        run: git -C zeroclaw-src diff --stat

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          prefix-key: ubuntu-22.04

      - name: Build release binary
        run: |
          cd zeroclaw-src
          cargo build --release --locked --features "${{ env.CARGO_FEATURES }}" --target x86_64-unknown-linux-gnu

      - name: Check binary size
        run: |
          SIZE=$(stat -c%s zeroclaw-src/target/x86_64-unknown-linux-gnu/release/zeroclaw)
          echo "Binary size: $SIZE bytes"
          if [ "$SIZE" -lt 10000000 ]; then
            echo "::error::Binary suspiciously small, build may have failed"
            exit 1
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-binary-${{ needs.check-update.outputs.version }}
          path: zeroclaw-src/target/x86_64-unknown-linux-gnu/release/zeroclaw
          retention-days: 7

      - name: Prepare Docker context
        run: |
          set -e
          mkdir -p docker-ctx/bin/amd64/web/dist
          mkdir -p docker-ctx/zeroclaw-data/.zeroclaw docker-ctx/zeroclaw-data/workspace
          cp zeroclaw-src/target/x86_64-unknown-linux-gnu/release/zeroclaw docker-ctx/bin/amd64/
          touch docker-ctx/bin/amd64/web/dist/.gitkeep
          cp zeroclaw-src/Dockerfile.debian.ci docker-ctx/Dockerfile

      - name: Generate config.toml
        env:
          CONFIG_CONTENT: |
            workspace_dir = "/zeroclaw-data/workspace"
            config_path = "/zeroclaw-data/.zeroclaw/config.toml"
            api_key = ""
            default_provider = "openrouter"
            default_model = "anthropic/claude-sonnet-4-20250514"
            default_temperature = 0.7

            [gateway]
            port = 42617
            host = "[::]"
            allow_public_bind = true
            web_dist_dir = "/zeroclaw-data/web/dist"

            [autonomy]
            level = "supervised"
            auto_approve = ["file_read", "file_write", "file_edit", "memory_recall", "memory_store", "web_search_tool", "web_fetch", "calculator", "glob_search", "content_search", "image_info", "weather", "git_operations"]
        run: |
          echo "$CONFIG_CONTENT" > docker-ctx/zeroclaw-data/.zeroclaw/config.toml
          mkdir -p docker-ctx/zeroclaw-data/workspace

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: docker-ctx
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:zeroclaw-${{ needs.check-update.outputs.version }}-debian
            ${{ env.REGISTRY }}/${{ github.repository }}:zeroclaw-debian
          platforms: linux/amd64

      - name: Save version
        run: |
          echo "${{ needs.check-update.outputs.version }}" > version.txt

      - name: Summary
        run: |
          echo "## Zeroclaw Build Summary"
          echo "| Item | Value |"
          echo "|------|-------|"
          echo "| Version | \`${{ needs.check-update.outputs.version }}\` |"
          echo "| Binary | zeroclaw-binary-${{ needs.check-update.outputs.version }} |"
          echo "| Docker | \`${{ env.REGISTRY }}/${{ github.repository }}:zeroclaw-${{ needs.check-update.outputs.version }}-debian\` |"
          echo "| Latest | \`${{ env.REGISTRY }}/${{ github.repository }}:zeroclaw-debian\` |"
