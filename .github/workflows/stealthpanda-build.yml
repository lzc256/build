name: StealthPanda - Build Binary

on:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            arch: arm64
            cross: gcc-aarch64-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone stealthpanda
        uses: actions/checkout@v4
        with:
          repository: we-be/stealthpanda
          path: stealthpanda

      - name: Install cross compiler
        if: matrix.cross
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ${{ matrix.cross }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: |
          cd stealthpanda
          if [ -n "${{ matrix.cross || '' }}" ]; then
            CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc \
            cargo build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stealthpanda-${{ matrix.arch }}
          path: stealthpanda/target/${{ matrix.target }}/release/stealthpanda
          retention-days: 7
