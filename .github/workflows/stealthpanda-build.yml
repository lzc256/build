name: StealthPanda - Build Binary

on:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux-gnu
            arch: amd64
          - target: aarch64-linux-gnu
            arch: arm64
            cross: gcc-aarch64-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone stealthpanda
        uses: actions/checkout@v4
        with:
          repository: we-be/stealthpanda
          path: stealthpanda

      - name: Install Zig
        run: |
          curl -L https://github.com/ziglang/zig/releases/download/0.15.2/zig-linux-x86_64-0.15.2.tar.xz -o zig.tar.xz
          tar -xf zig.tar.xz
          echo "$PWD/zig-linux-x86_64-0.15.2" >> $GITHUB_PATH

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xz-utils ca-certificates pkg-config libglib2.0-dev clang make curl git

      - name: Install cross compiler
        if: matrix.cross
        run: sudo apt-get install -y ${{ matrix.cross }}

      - name: Build
        env:
          CC: ${{ matrix.cross == 'gcc-aarch64-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}
        run: |
          cd stealthpanda
          make build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stealthpanda-${{ matrix.arch }}
          path: stealthpanda/zig-out/bin/lightpanda
          retention-days: 7
